
  - name: Install_nginx
    package:
        name: nginx
        update_cache: true

  - name: configure nginx
    template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf
    notify: restart nginx
      

  - name: edit starting page
    copy:
      content: "TEST 4"
      dest: /var/www/html/index.nginx-debian.html
    notify: restart nginx

  - name: x access.log
    command: chmod +r /var/log/nginx/access.log

  